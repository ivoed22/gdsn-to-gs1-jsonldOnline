services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_GIT_REF: ${APP_GIT_REF:-main}
    restart: unless-stopped
    # No `ports:` mapping to the host on purpose: the app is reachable
    # only from the cloudflared service over the internal compose
    # network. The tunnel is the sole public entry point.
    expose:
      - "8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in .env}
    depends_on:
      app:
        condition: service_healthy
