services:
  app:
    # Pulled by default: the build-and-publish.yml workflow builds and
    # pushes this multi-arch image automatically whenever the app repo's
    # main branch moves. `docker compose pull && up -d` is the normal
    # update path -- no local build needed. The `build:` block below is
    # still used by `docker compose build` for a custom APP_GIT_REF the
    # published image doesn't have yet.
    image: ghcr.io/ivoed22/gdsn-to-gs1-jsonldonline:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_GIT_REF: ${APP_GIT_REF:-main}
    restart: unless-stopped
    # No `ports:` mapping to the host on purpose: the app is reachable
    # only from the cloudflared service over the internal compose
    # network. The tunnel is the sole public entry point.
    expose:
      - "8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in .env}
    depends_on:
      app:
        condition: service_healthy
