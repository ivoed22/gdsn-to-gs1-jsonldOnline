name: Build and publish image

# Polls ivoed22/gdsn-to-gs1-jsonld's public main branch with a plain,
# unauthenticated `git ls-remote` instead of being triggered by it, so
# nothing in that repo needs to change or know this workflow exists --
# its own CI/release process stays completely untouched.
#
# When main has moved since the last successful build, this builds a
# multi-arch (amd64 + arm64) image and pushes it to GHCR, then records
# the built commit in .last-built-sha so the next run only rebuilds on
# an actual change.

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:
    inputs:
      force:
        description: "Build even if the app repo hasn't changed"
        type: boolean
        default: false

permissions:
  contents: write # to commit the updated .last-built-sha
  packages: write # to push the image to GHCR

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine latest app commit
        id: latest
        run: |
          SHA=$(git ls-remote https://github.com/ivoed22/gdsn-to-gs1-jsonld.git refs/heads/main | cut -f1)
          if [ -z "$SHA" ]; then
            echo "Could not resolve the app repo's main branch." >&2
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Compare against last built commit
        id: compare
        run: |
          LAST=$(cat .last-built-sha 2>/dev/null || echo "none")
          echo "Last built: $LAST"
          echo "Latest:     ${{ steps.latest.outputs.sha }}"
          if [ "$LAST" = "${{ steps.latest.outputs.sha }}" ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Lowercase image name
        if: steps.compare.outputs.changed == 'true'
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up QEMU (for arm64 builds on an amd64 runner)
        if: steps.compare.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.compare.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.compare.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.compare.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_GIT_REF=${{ steps.latest.outputs.sha }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.latest.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record built commit
        if: steps.compare.outputs.changed == 'true'
        run: |
          echo "${{ steps.latest.outputs.sha }}" > .last-built-sha
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-built-sha
          git commit -m "Record built app commit ${{ steps.latest.outputs.sha }}" || echo "Nothing to commit."
          git push
